# EN: On tag push — Release build (unsigned), DMG with .app + Applications link, GitHub Release with auto notes.
# RU: При push тега — Release без подписи, DMG с приложением и ярлыком Applications, GitHub Release с автозаметками.

name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-macos-dmg:
    name: Build macOS .app & DMG, publish Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Release (no code signing)
        run: |
          set -euo pipefail
          xcodebuild \
            -scheme "tic-tac-toe" \
            -project "tic-tac-toe.xcodeproj" \
            -destination "platform=macOS" \
            -configuration Release \
            -derivedDataPath "${{ github.workspace }}/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Create DMG (UDZO)
        run: |
          set -euo pipefail
          APP="${{ github.workspace }}/build/Build/Products/Release/tic-tac-toe.app"
          test -d "$APP"
          STAGE="${{ github.workspace }}/dmg_stage"
          OUT="${{ github.workspace }}/tic-tac-toe-${{ github.ref_name }}-macOS.dmg"
          rm -rf "$STAGE" "$OUT"
          mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -sf /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "tic-tac-toe ${{ github.ref_name }}" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            "$OUT"
          rm -rf "$STAGE"
          test -f "$OUT"
          ls -lh "$OUT"

      - name: Create GitHub Release and upload DMG
        uses: softprops/action-gh-release@v3
        with:
          files: tic-tac-toe-${{ github.ref_name }}-macOS.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
